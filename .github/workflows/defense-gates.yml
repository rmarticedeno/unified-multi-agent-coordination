name: Defense readiness gates

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  unit-static:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked --group dev
      - run: uv run ruff check src tests scripts
      - run: uv run mypy src/unified_multi_agent_coordination
      - run: uv run pytest --cov --cov-branch --cov-report=json --cov-fail-under=0
      - run: uv run python scripts/check_coverage.py coverage.json
      - run: uv run unified-evidence-preflight --corpus corpus/v0.5 --repository .
      - run: uv run unified-thesis-evidence --check
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: coverage.json

  third-party-a2a:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked --group dev
      - run: test -f vendor/a2a-samples/helloworld/UPSTREAM.json
      - run: uv run pytest -q tests/test_third_party_a2a.py

  deterministic-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked --group dev
      - run: uv run unified-coordination-scenarios --output tmp/ci/deterministic.json
      - run: uv run python scripts/check_evidence.py --deterministic tmp/ci/deterministic.json

  docker-a2a:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p tmp/ci/docker-a2a
      - run: docker compose -f docker-compose.system.yml up --build --abort-on-container-exit --exit-code-from system-tests
        env:
          EVIDENCE_RUN_DIR: ${{ github.workspace }}/tmp/ci/docker-a2a

  postgres-distributed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p tmp/ci/postgres
      - run: docker compose -f docker-compose.distributed.yml up --build --abort-on-container-exit --exit-code-from distributed-system-tests
        env:
          EVIDENCE_RUN_DIR: ${{ github.workspace }}/tmp/ci/postgres

  consensus-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked --group dev
      - run: uv run unified-consensus-matrix --smoke --output-dir tmp/ci/consensus-smoke
      - uses: actions/upload-artifact@v4
        with:
          name: consensus-smoke
          path: tmp/ci/consensus-smoke

  consensus-full:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/rc-')
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked --group dev
      - run: uv run unified-consensus-matrix --trials 3 --output-dir tmp/ci/consensus-full --promotion-candidate
      - uses: actions/upload-artifact@v4
        with:
          name: consensus-full
          path: tmp/ci/consensus-full

  thesis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install LuaLaTeX and BibTeX
        run: sudo apt-get update && sudo apt-get install -y texlive-luatex texlive-bibtex-extra texlive-latex-extra latexmk poppler-utils
      - run: latexmk -lualatex -bibtex -interaction=nonstopmode -halt-on-error main.tex
        working-directory: thesis
      - run: '! grep -E "undefined references|Citation .* undefined|Reference .* undefined" thesis/main.log'
      - run: mkdir -p tmp/pdfs/thesis && pdftoppm -png -r 120 thesis/main.pdf tmp/pdfs/thesis/page
      - uses: actions/upload-artifact@v4
        with:
          name: thesis-pdf
          path: thesis/main.pdf
